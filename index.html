<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NINJA RUNNER - L'Ombre Numérique</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+JP:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-red: #ff0844;
            --neon-cyan: #00f3ff;
            --neon-purple: #b026ff;
            --dark-bg: #0a0a0f;
            --darker-bg: #050508;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b8;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--dark-bg);
            color: var(--text-primary);
            overflow-x: hidden;
            cursor: default;
        }

        /* Animated Background */
        .bg-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .bg-grid {
            background: 
                linear-gradient(90deg, rgba(255, 8, 68, 0.03) 1px, transparent 1px),
                linear-gradient(0deg, rgba(0, 243, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .bg-gradient {
            background: radial-gradient(ellipse at 20% 30%, rgba(255, 8, 68, 0.15) 0%, transparent 50%),
                        radial-gradient(ellipse at 80% 70%, rgba(0, 243, 255, 0.12) 0%, transparent 50%),
                        radial-gradient(ellipse at 50% 50%, rgba(176, 38, 255, 0.08) 0%, transparent 60%);
        }

        /* Ninja Silhouette */
        .ninja-silhouette {
            position: fixed;
            right: -10%;
            top: 50%;
            transform: translateY(-50%);
            width: 600px;
            height: 600px;
            opacity: 0.08;
            z-index: 1;
            pointer-events: none;
        }

        .ninja-shape {
            position: absolute;
            background: linear-gradient(135deg, var(--neon-red), var(--neon-cyan));
            filter: blur(2px);
            animation: ninjaFloat 8s ease-in-out infinite;
        }

        .ninja-head {
            width: 120px;
            height: 120px;
            top: 50px;
            left: 240px;
            border-radius: 50%;
        }

        .ninja-body {
            width: 180px;
            height: 280px;
            top: 150px;
            left: 210px;
            clip-path: polygon(30% 0%, 70% 0%, 100% 100%, 0% 100%);
        }

        .ninja-arm-left {
            width: 100px;
            height: 140px;
            top: 180px;
            left: 140px;
            transform: rotate(-30deg);
            clip-path: polygon(20% 0%, 80% 0%, 60% 100%, 40% 100%);
        }

        .ninja-arm-right {
            width: 100px;
            height: 140px;
            top: 180px;
            right: 140px;
            transform: rotate(30deg);
            clip-path: polygon(20% 0%, 80% 0%, 60% 100%, 40% 100%);
        }

        @keyframes ninjaFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-20px) rotate(2deg); }
            66% { transform: translateY(10px) rotate(-2deg); }
        }

        /* Main Container */
        .container {
            position: relative;
            z-index: 2;
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header */
        header {
            text-align: center;
            padding: 80px 20px 60px;
            animation: fadeSlideDown 1s ease-out;
        }

        @keyframes fadeSlideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-container {
            margin-bottom: 30px;
            position: relative;
        }

        .logo-text {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(3rem, 10vw, 7rem);
            font-weight: 900;
            letter-spacing: 0.15em;
            background: linear-gradient(135deg, var(--neon-red), var(--neon-cyan), var(--neon-purple));
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(255, 8, 68, 0.5);
            animation: gradientShift 4s ease infinite, glowPulse 2s ease-in-out infinite;
            position: relative;
            display: inline-block;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes glowPulse {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(255, 8, 68, 0.6)); }
            50% { filter: drop-shadow(0 0 40px rgba(0, 243, 255, 0.8)); }
        }

        .tagline {
            font-size: clamp(1rem, 3vw, 1.4rem);
            color: var(--text-secondary);
            letter-spacing: 0.3em;
            text-transform: uppercase;
            font-weight: 300;
            margin-top: 10px;
            animation: fadeIn 1s ease-out 0.3s both;
        }

        .tagline-jp {
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
            color: var(--neon-cyan);
            margin-top: 8px;
            opacity: 0.7;
            animation: fadeIn 1s ease-out 0.5s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Video/Hero Section */
        .hero-section {
            margin: 60px 0 80px;
            position: relative;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        .video-container {
            position: relative;
            max-width: 900px;
            margin: 0 auto;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 
                0 0 80px rgba(255, 8, 68, 0.3),
                0 0 120px rgba(0, 243, 255, 0.2),
                inset 0 0 0 1px rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .video-container:hover {
            transform: translateY(-5px);
            box-shadow: 
                0 10px 100px rgba(255, 8, 68, 0.5),
                0 10px 140px rgba(0, 243, 255, 0.3),
                inset 0 0 0 1px rgba(255, 255, 255, 0.2);
        }

        .video-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(135deg, 
                rgba(255, 8, 68, 0.1) 0%, 
                rgba(0, 243, 255, 0.1) 50%,
                rgba(176, 38, 255, 0.1) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .video-placeholder::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.1), 
                transparent);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            to { left: 200%; }
        }

        .play-icon {
            width: 100px;
            height: 100px;
            border: 3px solid var(--neon-red);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: rgba(255, 8, 68, 0.1);
            backdrop-filter: blur(10px);
        }

        .play-icon:hover {
            transform: scale(1.1);
            border-color: var(--neon-cyan);
            background: rgba(0, 243, 255, 0.2);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.6);
        }

        .play-icon::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 25px solid var(--neon-red);
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            margin-left: 8px;
        }

        .play-icon:hover::after {
            border-left-color: var(--neon-cyan);
        }

        /* Downloads Section */
        .downloads-section {
            animation: fadeIn 1s ease-out 0.8s both;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(2rem, 5vw, 3rem);
            text-align: center;
            margin-bottom: 60px;
            letter-spacing: 0.1em;
            color: var(--text-primary);
            position: relative;
            padding-bottom: 20px;
        }

        .section-title::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-red), var(--neon-cyan));
            animation: lineExpand 0.8s ease-out 1s both;
        }

        @keyframes lineExpand {
            from { width: 0; }
            to { width: 100px; }
        }

        .download-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px;
        }

        .download-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }

        .download-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--neon-red), var(--neon-cyan));
            transform: scaleX(0);
            transition: transform 0.4s ease;
        }

        .download-card:hover::before {
            transform: scaleX(1);
        }

        .download-card::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 8, 68, 0.1), transparent);
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        .download-card:hover::after {
            width: 500px;
            height: 500px;
        }

        .download-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 8, 68, 0.5);
            box-shadow: 
                0 20px 60px rgba(255, 8, 68, 0.3),
                0 0 80px rgba(0, 243, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        /* Stagger animation for cards */
        .download-card:nth-child(1) { animation: cardSlideUp 0.6s ease-out 1s both; }
        .download-card:nth-child(2) { animation: cardSlideUp 0.6s ease-out 1.15s both; }
        .download-card:nth-child(3) { animation: cardSlideUp 0.6s ease-out 1.3s both; }

        @keyframes cardSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .platform-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            position: relative;
            z-index: 1;
        }

        .icon-svg {
            width: 100%;
            height: 100%;
            fill: var(--neon-cyan);
            filter: drop-shadow(0 0 20px rgba(0, 243, 255, 0.5));
            transition: all 0.3s ease;
        }

        .download-card:hover .icon-svg {
            fill: var(--neon-red);
            filter: drop-shadow(0 0 30px rgba(255, 8, 68, 0.8));
            transform: scale(1.1) rotate(5deg);
        }

        .platform-name {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 15px;
            letter-spacing: 0.05em;
            position: relative;
            z-index: 1;
        }

        .platform-specs {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 25px;
            line-height: 1.6;
            position: relative;
            z-index: 1;
        }

        .download-btn {
            display: inline-block;
            padding: 14px 40px;
            background: linear-gradient(135deg, var(--neon-red), #ff3366);
            border: none;
            border-radius: 30px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(255, 8, 68, 0.4);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        .download-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .download-btn:hover::before {
            left: 100%;
        }

        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(255, 8, 68, 0.6);
            background: linear-gradient(135deg, #ff3366, var(--neon-cyan));
        }

        .download-btn:active {
            transform: scale(0.98);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 80px 20px 40px;
            margin-top: 100px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
            animation: fadeIn 1s ease-out 1.5s both;
        }

        .footer-text {
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .footer-jp {
            font-size: 0.85rem;
            color: var(--neon-purple);
            opacity: 0.7;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .ninja-silhouette {
                width: 400px;
                height: 400px;
                opacity: 0.04;
            }

            header {
                padding: 60px 20px 40px;
            }

            .download-grid {
                grid-template-columns: 1fr;
                gap: 25px;
            }

            .section-title {
                margin-bottom: 40px;
            }
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--darker-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--neon-red), var(--neon-cyan));
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--neon-cyan), var(--neon-purple));
        }

        /* Particles effect */
        .particle {
            position: fixed;
            width: 2px;
            height: 2px;
            background: var(--neon-cyan);
            border-radius: 50%;
            pointer-events: none;
            opacity: 0;
            animation: particleFloat 4s ease-in-out infinite;
        }

        @keyframes particleFloat {
            0% {
                transform: translateY(0) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(50px);
                opacity: 0;
            }
        }
    </style>
</head>

    <script>
        // Create floating particles
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 4 + 's';
            particle.style.animationDuration = (Math.random() * 3 + 3) + 's';
            document.body.appendChild(particle);

            setTimeout(() => {
                particle.remove();
            }, 7000);
        }

        // Generate particles periodically
        setInterval(createParticle, 400);

        // Add smooth scroll behavior
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });

        // Video placeholder interaction
        document.querySelector('.play-icon').addEventListener('click', function() {
            alert('Intégrer votre vidéo de gameplay ici !\n\nRemplacez .video-placeholder par :\n<iframe src="YOUR_VIDEO_URL" frameborder="0" allowfullscreen></iframe>');
        });

        // Add interactive cursor effect
        document.addEventListener('mousemove', (e) => {
            const cards = document.querySelectorAll('.download-card');
            cards.forEach(card => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                if (x >= 0 && x <= rect.width && y >= 0 && y <= rect.height) {
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = (y - centerY) / 20;
                    const rotateY = (centerX - x) / 20;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) translateY(-10px)`;
                }
            });
        });

        document.querySelectorAll('.download-card').forEach(card => {
            card.addEventListener('mouseleave', function() {
                this.style.transform = 'perspective(1000px) rotateX(0) rotateY(0) translateY(0)';
            });
        });
    </script>
</body>
