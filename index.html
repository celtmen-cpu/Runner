<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ninja Runner</title>

    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>

    <div class="container">

        <div class="title-box">
            <h1>Ninja Runner</h1>
            <p>Choisissez votre plateforme</p>
        </div>

        <div class="downloads">

            <div class="card">
                <h2>Windows</h2>
                <button class="download-btn windows">
                    Télécharger
                </button>
            </div>

            <div class="card">
                <h2>Mac</h2>
                <button class="download-btn mac">
                    Télécharger
                </button>
            </div>

            <div class="card">
                <h2>Android</h2>
                <button class="download-btn android">
                    Télécharger
                </button>
            </div>

        </div>

    </div>

</body>
</html>
